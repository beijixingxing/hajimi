name: Build, Push, and Sync # 更全面的工作流名称

on:
  # 定义触发工作流的事件
  push:
    # 当代码推送到指定分支时触发
    branches:
      - main # 仅当代码推送到 main 分支时触发
  # 定时触发工作流，每 6 小时运行一次
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build-and-push: # 定义一个名为 build-and-push 的任务
    runs-on: ubuntu-latest # 指定运行此任务的操作系统环境

    steps: # 定义任务中的步骤
      - name: Checkout code # 步骤的名称：检出代码
        # 使用 actions/checkout@v3 这个 action 来检出代码
        uses: actions/checkout@v3

      - name: Set up Docker Buildx # 步骤的名称：设置 Docker Buildx
        # 使用 docker/setup-buildx-action@v2 这个 action 来设置 Docker Buildx，用于支持多平台构建
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub # 步骤的名称：登录到 Docker Hub
        # 使用 docker/login-action@v2 这个 action 来登录到 Docker Hub
        uses: docker/login-action@v2
        with:
          # 使用 GitHub Secrets 中存储的 Docker Hub 用户名
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          # 使用 GitHub Secrets 中存储的 Docker Hub 令牌（建议使用令牌而不是密码）
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image # 步骤的名称：构建并推送 Docker 镜像
        # 使用 docker/build-push-action@v4 这个 action 来构建和推送 Docker 镜像
        uses: docker/build-push-action@v4
        with:
          context: .
          dockerfile: Dockerfile_git
          # 注意：标签中的 GITHUB_SHA::8 可能需要是 ${{ github.sha }} 的一部分
          # 修正为：
          tags: |
            beijixingxing/hajimi:latest
            beijixingxing/hajimi:${{ github.sha }} # 使用完整的 SHA 或截断 ${{ github.sha }}
            beijixingxing/hajimi:${{ github.sha }} # 或者使用表达式截断: beijixingxing/hajimi:${{ format('{0}', github.sha).substring(0, 8) }}
          push: true
          # 配置构建缓存
          cache-from: type=registry,ref=beijixingxing/hajimi:cache
          cache-to: type=registry,ref=beijixingxing/hajimi:cache,mode=max

  sync-fork: # 定义一个名为 sync-fork 的任务
    runs-on: ubuntu-latest # 指定运行此任务的操作系统环境

    steps: # 定义任务中的步骤
      - name: Checkout repository # 步骤的名称：检出仓库
        # 使用 actions/checkout@v3 这个 action 来检出代码
        uses: actions/checkout@v3
        with:
          # 获取完整的提交历史，以便进行准确的比较和合并
          fetch-depth: 0
          # 为了能够推送回仓库，需要使用 Personal Access Token (PAT)
          # 如果 GITHUB_TOKEN 权限不足 (通常对于 Actions 触发的提交是足够的)
          # token: ${{ secrets.PERSONAL_ACCESS_TOKEN }} # 如果需要，取消注释并创建此 Secret

      - name: Set up Git # 步骤的名称：设置 Git
        # 运行脚本来配置 Git 用户名和邮箱
        # *** 修正此处的缩进 ***
        run: |
          git config user.name "beijixingxing" # 设置 Git 用户名为 beijixingxing (或使用 GitHub Actions bot)
          git config user.email "yunxi815@gmail.com" # 设置 Git 邮箱 (或使用 GitHub Actions bot 邮箱)
          # 建议使用 Actions Bot 身份，除非有特殊原因
          # git config user.name "github-actions[bot]"
          # git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote # 步骤的名称：添加上游仓库的远程地址
        # 运行脚本来添加一个名为 upstream 的远程仓库，指向原始的上游仓库
        run: |
          git remote add upstream https://github.com/wyeeeee/hajimi.git # 设置上游仓库为 https://github.com/wyeeeee/hajimi.git

      - name: Fetch upstream changes # 步骤的名称：获取上游仓库的更改
        # 运行脚本来从上游仓库获取最新的提交和分支信息
        run: git fetch upstream

      - name: Merge upstream changes # 步骤的名称：合并上游仓库的更改
        # 运行脚本来将上游仓库的 main 分支合并到当前分支
        # 添加 --no-edit 避免在可能需要消息时卡住
        # 添加 --ff-only 或其他策略来处理合并方式（可选）
        # 如果可能冲突，需要更复杂的处理逻辑
        run: git merge upstream/main --no-edit

      - name: Push changes to fork # 步骤的名称：推送更改到 fork 仓库
        # 运行脚本来将合并后的更改推送到当前仓库的 main 分支
        env:
          # 设置环境变量 GITHUB_TOKEN，用于进行推送操作
          # GITHUB_TOKEN 通常足够推送回触发工作流的仓库
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # 检查是否有更改需要推送，避免空推送
        run: |
          git status
          # 检查本地 main 是否领先 origin/main (即是否有新的合并提交)
          if git diff --quiet HEAD origin/main; then
            echo "No changes to push."
          else
            echo "Pushing changes to origin main..."
            git push origin main
          fi
