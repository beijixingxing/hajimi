# .github/workflows/build-push-sync.yml
name: Build, Push Docker Image, and Sync Fork

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*' # 仍然可以基于 Git 标签触发

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write # 需要写权限以推送镜像到 Docker Hub (虽然 action 是 login, 但元数据可能需要)

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # --- 新增步骤：从 version.txt 读取并格式化版本号 ---
      - name: Read version from version.txt
        id: read_version # 为步骤设置 ID 以便引用其输出
        run: |
          # 读取文件内容 (例如 "version=0.1.1")
          VERSION_LINE=$(cat version.txt)
          # 检查文件内容是否符合预期格式
          if [[ ! "$VERSION_LINE" =~ ^version=([0-9]+\.[0-9]+\.[0-9]+.*)$ ]]; then
            echo "Error: version.txt format is incorrect. Expected 'version=X.Y.Z'."
            exit 1
          fi
          # 使用 cut 提取 '=' 后面的部分 (0.1.1)
          VERSION_NUM=$(echo "$VERSION_LINE" | cut -d '=' -f 2)
          # 在版本号前加上 'v'
          FORMATTED_VERSION="v$VERSION_NUM"
          echo "Read version number: $VERSION_NUM"
          echo "Formatted tag: $FORMATTED_VERSION"
          # 使用 GITHUB_OUTPUT 设置输出变量 (新推荐方式)
          echo "version_tag=$FORMATTED_VERSION" >> $GITHUB_OUTPUT

      # --- 注意：这个压缩步骤是否真的需要？ ---
      # 如果你的 Dockerfile 仍然使用 COPY ./app/ /app/，这个 zip 文件可能不会被用到。
      # 请确认 Dockerfile 是否已修改为处理 app.zip。
      - name: Compress app files (Verify if needed by Dockerfile)
        run: |
          if [ -d "app" ]; then
            echo "Compressing ./app directory..."
            cd app
            zip -r ../app.zip .
            cd ..
            echo "Created app.zip"
          else
            echo "Warning: ./app directory not found, skipping compression."
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # --- 修改步骤：使用读取到的版本号生成标签 ---
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: beijixingxing/hajimi
          tags: |
            # 1. 使用从 version.txt 读取并格式化后的版本号作为主要标签
            type=raw,value=${{ steps.read_version.outputs.version_tag }}

            # 2. (可选) 如果推送的是 Git 标签 (vX.Y.Z)，也生成对应的 semver 标签
            #    这在你手动打 Git 标签发布时有用
            type=semver,pattern={{version}} # 例如 v1.0.0 -> 1.0.0
            type=semver,pattern={{major}}.{{minor}} # 例如 v1.0.0 -> 1.0
            type=semver,pattern={{major}} # 例如 v1.0.0 -> 1

            # 3. 如果是推送到 main 分支，打上 latest 标签
            type=ref,event=branch,pattern=main,value=latest

            # 4. 总是打上短 SHA 标签，方便调试
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          # 确认 Dockerfile 文件名是否正确 (之前是 Dockerfile_git)
          file: ./Dockerfile
          # platform: linux/amd64,linux/arm64 # 如果需要多平台
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 缓存可以根据需要重新启用，例如 type=gha 或 type=inline
          # cache-from: type=gha
          # cache-to: type=gha,mode=max

  sync-fork:
    name: Sync Fork with Upstream
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Git
        run: |
          git config user.name "beijixingxing"
          git config user.email "yunxi815@gmail.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/wyeeeee/hajimi.git

      - name: Fetch upstream changes
        run: git fetch upstream main

      - name: Merge upstream changes
        run: |
          git checkout main
          git merge --no-edit -X theirs upstream/main || (echo "Merge failed, check for conflicts manually" && exit 1)

      - name: Push changes to fork
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git push origin main

