# 定义工作流的名称
name: Build, Push Docker Image, and Sync Fork 

# 定义触发工作流的事件
on: 
  # 当有推送事件发生时
  push: 
    # 指定触发的分支
    branches: 
      - main 
    # 指定触发的标签格式
    tags: 
      - 'v*.*.*' 

# 定义工作流中包含的任务
jobs: 
  # 定义第一个任务，名为 build-and-push
  build-and-push: 
    # 设置任务在 GitHub UI 中显示的名称
    name: Build and Push Docker Image 
    # 指定任务运行在最新版的 Ubuntu 虚拟机上
    runs-on: ubuntu-latest 
    # 设置任务运行的条件：当推送是到 main 分支 或 推送的是以 'refs/tags/v' 开头的标签时
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    # 移除了 actions: write 和 packages: write 权限，因为不再需要操作缓存或 GitHub Packages
    permissions:
      # 只需要读取代码权限
      contents: read 

    # 定义任务中的步骤序列
    steps: 
      # 定义步骤一：检出代码
      - name: Checkout code 
        # 使用官方的 checkout action 来获取仓库代码
        uses: actions/checkout@v3 
        # 为 action 提供参数
        with: 
          # 获取所有 Git 历史记录 (0 表示完整历史)
          fetch-depth: 0 

      # 新增步骤：压缩 app 文件夹内的文件
      - name: Compress app files 
        run: |
          # 进入 app 目录
          cd app
          # 递归压缩 app 目录下的所有文件到上级目录的 app.zip
          zip -r ../app.zip .
          # 返回上级目录
          cd ..

      # 定义步骤二：设置 Docker Buildx
      - name: Set up Docker Buildx 
        # 使用官方的 setup-buildx action，启用更高级的 Docker 构建功能，如多平台构建
        uses: docker/setup-buildx-action@v2

      # 定义步骤三：登录到 Docker Hub
      - name: Login to Docker Hub 
        # 使用官方的 login action 来登录 Docker 镜像仓库
        uses: docker/login-action@v2
        # 为 action 提供参数
        with: 
          # 使用仓库 Secrets 中存储的 Docker Hub 用户名
          username: ${{ secrets.DOCKERHUB_USERNAME }} 
          # 使用仓库 Secrets 中存储的 Docker Hub 访问令牌 (PAT)
          password: ${{ secrets.DOCKERHUB_TOKEN }} 

      # 定义步骤四：提取 Docker 元数据
      - name: Docker meta 
        # 为此步骤设置一个 ID (meta)，以便后续步骤引用其输出
        id: meta 
        # 使用官方的 metadata-action
        uses: docker/metadata-action@v4 
        # 为 action 提供参数
        with: 
          # 指定要构建和推送的 Docker 镜像名称
          images: beijixingxing/hajimi 
          # 定义生成 Docker 标签的规则 (多行字符串)
          tags: | 
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch,pattern=main,value=latest
            type=sha,prefix=sha-,format=short

      # 定义步骤五：构建并推送 Docker 镜像
      - name: Build and push Docker image 
        # 使用官方的 build-push action 来执行 Docker 构建和推送
        uses: docker/build-push-action@v4
        # 为 action 提供参数
        with: 
          # 指定 Docker 构建上下文为仓库根目录
          context: . 
          # 修改为使用 Dockerfile 构建
          file: ./Dockerfile 
          # 如果需要构建多平台镜像，取消此行注释并指定目标平台
          # platform: linux/amd64,linux/arm64 
          # 构建完成后将镜像推送到 Docker Hub
          push: true 
          # 使用上一步骤 (meta) 生成的标签列表
          tags: ${{ steps.meta.outputs.tags }} 
          # 使用上一步骤 (meta) 生成的 Labels 列表
          labels: ${{ steps.meta.outputs.labels }} 
          # --- cache-from 和 cache-to 参数已被删除 ---

  # 定义第二个任务，名为 sync-fork
  sync-fork: 
    # 设置任务在 GitHub UI 中显示的名称
    name: Sync Fork with Upstream 
    # 设置任务运行的条件：仅当推送是到 main 分支时运行此任务
    if: github.ref == 'refs/heads/main'
    # 指定任务运行在最新版的 Ubuntu 虚拟机上
    runs-on: ubuntu-latest 
    # sync-fork 任务通常只需要读取和写入仓库内容
    permissions:
      contents: write

    # 定义任务中的步骤序列
    steps: 
      # 定义步骤一：检出当前 Fork 仓库的代码
      - name: Checkout repository 
        # 使用官方的 checkout action
        uses: actions/checkout@v3 
        # 为 action 提供参数
        with: 
          # 获取所有 Git 历史记录
          fetch-depth: 0 
          # 使用 GitHub 自动提供的 GITHUB_TOKEN 进行认证，以便后续推送
          token: ${{ secrets.GITHUB_TOKEN }} 

      # 定义步骤二：设置 Git 配置
      - name: Set up Git 
        run: | 
          # 配置 Git 提交时使用的用户名
          git config user.name "beijixingxing" 
          # 配置 Git 提交时使用的邮箱
          git config user.email "yunxi815@gmail.com" 

      # 定义步骤三：添加上游仓库的远程地址
      - name: Add upstream remote 
        run: | 
          # 添加一个名为 'upstream' 的远程仓库，指向原始仓库的 URL
          git remote add upstream https://github.com/wyeeeee/hajimi.git

      # 定义步骤四：获取上游仓库的更改
      - name: Fetch upstream changes 
        run: git fetch upstream main 

      # 定义步骤五：合并上游仓库的更改
      - name: Merge upstream changes 
        run: | 
          # 切换到本地的 main 分支
          git checkout main 
          # 使用 --no-edit 避免在 CI 环境中打开编辑器
          # 使用 -X theirs 策略在冲突时优先使用上游更改，根据需要调整
          git merge --no-edit -X theirs upstream/main || (echo "Merge failed, check for conflicts manually" && exit 1)

      # 定义步骤六：将更改推送到当前 Fork 仓库
      - name: Push changes to fork 
        env: 
          # 将 GITHUB_TOKEN 设置为环境变量，某些 git 操作可能需要
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
        run: git push origin main 